version: '3'
services:
  db:
    container_name: ultra-test-cars-mysql
    image: mysql
    command: --default-authentication-plugin=mysql_native_password
    restart: always
    environment:
      MYSQL_TCP_PORT: 13306
      MYSQLX_TCP_PORT: 13307
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: test
    network_mode: host
  cars-ms:
    container_name: ultra-test-cars-ms
    build: .
    image: test/cars-ms:latest
    restart: always
    network_mode: host

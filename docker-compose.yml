version: '3'
services:
  db:
    container_name: ultra-tech-test-cars-mysql
    image: mysql:5
    #command: --default-authentication-plugin=mysql_native_password
    environment:
      MYSQL_TCP_PORT: 13306
      MYSQL_ROOT_PASSWORD: secret
      MYSQL_USER: ms
      MYSQL_PASSWORD: secret
      MYSQL_DATABASE: cars
    network_mode: host
  ms:
    container_name: ultra-tech-test-cars-ms
    build: .
    image: ultra-tech-test/cars-ms:latest
    network_mode: host
